name: Test install-only
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          version: latest
          install-only: 'true'
      - name: Assert upx is installed
        run: |
          if ! command -v upx &>/dev/null; then
            echo "FAIL: upx binary not found in PATH"
            exit 1
          fi
          echo "upx version: $(upx --version | head -1)"
          echo "PASS"
