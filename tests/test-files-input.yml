name: Test files input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Prepare test binary
        run: |
          mkdir -p /tmp/upx-test
          cp /bin/ls /tmp/upx-test/ls-copy
          chmod +x /tmp/upx-test/ls-copy
          echo "Original size: $(stat -c%s /tmp/upx-test/ls-copy) bytes"
      - id: action
        uses: .
        with:
          version: latest
          files: |
            /tmp/upx-test/ls-copy
      - name: Assert binary was compressed
        run: |
          echo "Compressed size: $(stat -c%s /tmp/upx-test/ls-copy) bytes"
          # Verify the binary still works after compression
          /tmp/upx-test/ls-copy --version || /tmp/upx-test/ls-copy /tmp > /dev/null
          echo "PASS: binary compressed and still executable"
